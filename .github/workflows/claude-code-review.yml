name: Claude Code Review

on:
  pull_request:
    # Cost: dropped `synchronize` to stop firing on every push.
    # Re-trigger via `@claude review again` in PR comments when needed.
    types: [opened, ready_for_review]
    paths-ignore:
      - '**.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for:
            1. Code correctness and logic errors
            2. Security issues (injection patterns, hardcoded secrets, unsafe regex, auth/authz flaws)
            3. Language/framework best practices
            4. Test coverage for new behaviors
            5. Alignment with repo's CLAUDE.md conventions (if present)

            Focus on the diff only. Be concise — flag real issues, not style preferences.

            Use `gh pr comment` with your Bash tool to leave your review.

          # --bare skips CLAUDE.md auto-load (~30-50% per-call savings on Sonnet);
          # 0k-rag's CLAUDE.md context isn't critical for code review like PAI's is.
          # --max-budget-usd caps per-call spend at $1; --max-turns 10 prevents runaway loops.
          claude_args: |
            --bare
            --model claude-sonnet-4-6
            --max-turns 10
            --max-budget-usd 1.00
            --allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"
