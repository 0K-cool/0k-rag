# 0K-RAG Example Configuration
# Copy this file to your project root as .0k-rag.yml

project:
  name: my-project
  description: My project documentation and knowledge base

database:
  path: ./lance_vex_kb  # NOTE: legacy default path name — preserved for existing installations
  backup_dir: ~/0k-rag-backups/

indexing:
  chunk_size: 384
  chunk_overlap: 0.15
  context_model: llama3.1:8b
  embedding_model: nomic-embed-text:latest
  enable_sanitization: true
  auto_index_extensions:
    - .md
    - .pdf
    - .txt
  auto_index_paths:
    - .claude/
    - output/research/
    - README.md
    - CLAUDE.md

retrieval:
  default_top_k: 5
  vector_limit: 20
  bm25_limit: 20
  fusion_limit: 10
  enable_reranking: true
  reranker_model: BAAI/bge-reranker-large

projects_to_index:
  - name: my-project
    paths:
      - .claude/
      - output/research/
      - README.md
      - CLAUDE.md

memory:
  enabled: true
  storage_path: .claude/memory/memory.jsonl

security:
  # Allowed base directories for file operations (prevents path traversal)
  # All document paths must be within these directories
  allowed_base_paths:
    - ~/my-project
    - ~/documents

backup:
  enabled: true
  schedule: weekly
  retention:
    daily: 7
    weekly: 4

logging:
  level: INFO
  file: .claude/logs/rag.log

# Progress notifications during indexing (v1.3.0+)
notifications:
  console:
    enabled: true              # Show progress in terminal (default: true)
    show_progress_bar: true    # Display ASCII progress bars
    verbose: false             # Show detailed per-chunk progress
  webhook:
    enabled: false             # Enable webhook notifications (default: false)
    url: ""                    # Discord/Slack/Teams webhook URL (supports ${ENV_VAR})
    template: "discord"        # Options: discord, slack, teams, generic
    notify_stages:             # Only notify for these stages (empty = all stages)
      - COMPLETE
      - ERROR
    min_interval: 2.0          # Rate limiting (seconds between notifications)
